<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #F7F2EA; height: 100dvh; display: flex; flex-direction: column; max-width: 430px; margin: 0 auto; }
.header { background: white; padding: 12px 16px; border-bottom: 1px solid #ddd; flex-shrink: 0; font-size: 20px; font-weight: bold; }
.tabs { background: white; display: flex; border-bottom: 1px solid #ddd; flex-shrink: 0; }
.tab { flex: 1; padding: 10px; text-align: center; font-size: 13px; cursor: pointer; border: none; background: none; }
.tab.active { color: #C85C2A; font-weight: bold; }
.screen { display: none; flex: 1; flex-direction: column; min-height: 0; }
.screen.active { display: flex; }
.scroll { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; min-height: 0; }
.card { background: white; border: 1px solid #ddd; border-radius: 16px; padding: 16px; }
.keypad { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; padding: 12px; background: #eee; flex-shrink: 0; }
.key { aspect-ratio: 1.4; border-radius: 10px; border: none; font-size: 20px; background: white; cursor: pointer; }
</style>
</head>
<body>
<div class="header">はかるん</div>
<div class="tabs">
  <button class="tab active" onclick="go('convert',this)">⚖️ 変換</button>
  <button class="tab" onclick="go('recipe',this)">📋 レシピ</button>
  <button class="tab" onclick="go('foods',this)">🥄 食材</button>
</div>

<div class="screen active" id="screen-convert">
  <div class="scroll">
    <div class="card">食材選択</div>
    <div class="card">変換方向</div>
    <div class="card">単位</div>
    <div class="card">入力</div>
    <div class="card" style="background:#C85C2A;color:white;">結果</div>
  </div>
  <div class="keypad">
    <button class="key">7</button><button class="key">8</button><button class="key">9</button>
    <button class="key">4</button><button class="key">5</button><button class="key">6</button>
    <button class="key">1</button><button class="key">2</button><button class="key">3</button>
    <button class="key">·</button><button class="key">0</button><button class="key">⌫</button>
  </div>
</div>

<div class="screen" id="screen-recipe">
  <div class="scroll">
    <div class="card">人数スケール: ×½ ×1 ×2 ×3 ×4</div>
    <div class="card">食材リスト<br><br>まだ食材がありません<br><br><button>＋ 食材を追加</button></div>
  </div>
</div>

<div class="screen" id="screen-foods">
  <div class="scroll">
    <div class="card">食材管理</div>
  </div>
</div>

<script>
function go(tab, el) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');
  el.classList.add('active');
}
</script>
</body>
</html>
